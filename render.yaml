# Thulium AI Agent Backend

Backend dla Render.com. Odbiera żądania z wtyczki Opera GX oraz webhooki z Thulium, pobiera dane zgłoszenia z Thulium REST API i generuje propozycję odpowiedzi przez OpenAI.

## Deploy na Render.com

1. Wrzuć katalog `backend-render` do repozytorium GitHub.
2. W Render utwórz nową usługę `Web Service`.
3. Render wykryje `render.yaml`.
4. Ustaw zmienne środowiskowe:
   - `THULIUM_API_USER`
   - `THULIUM_API_PASSWORD`
   - `OPENAI_API_KEY`
   - `EXTENSION_API_KEY`
   - opcjonalnie `WEBHOOK_BASIC_USER`
   - opcjonalnie `WEBHOOK_BASIC_PASSWORD`

Nie wkładaj hasła Thulium do frontendu/wtyczki.

## Endpointy

- `GET /health`
- `POST /api/generate-reply`
- `POST /api/test-thulium`
- `POST /webhooks/thulium`

## Przykład generate-reply

```json
{
  "ticketId": "12",
  "tone": "professional",
  "mode": "comment"
}
```

`mode`:
- `preview` — tylko zwraca wynik do wtyczki.
- `comment` — próbuje dodać komentarz wewnętrzny do ticketu.
- `agent_response` — NIEZALECANE NA START; próbuje wysłać odpowiedź do klienta jako agent, jeśli endpoint i pola będą zgodne z Thulium.

## Uwaga o payloadach Thulium

Dokumentacja PDF pokazuje dostępne endpointy, ale struktura pól dla `POST tickets/:id/comment` i `POST tickets/:id/agent_response` może zależeć od wersji Thulium. W `src/thuliumClient.js` funkcje `addTicketComment` i `sendAgentResponse` próbują kilku popularnych nazw pól (`content`, `message`, `body`). Po pierwszym teście najlepiej zostawić wariant, który działa.
